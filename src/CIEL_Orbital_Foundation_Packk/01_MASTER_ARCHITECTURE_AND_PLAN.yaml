project:
  name: CIEL Native Orbital System
  version: v2 detailed foundation pack
  language: English
  status: pre-implementation architecture and planning package
  purpose: Define the canonical architecture, geometry, dynamics, implementation phases, metrics, and decision structure for a new native orbital-relational system outside any existing repository.
source_anchors:
- 'Relational contract formalism: relational manifold M_rel with Kähler metric, informational phases γ={γ_S,γ_C,γ_Q,γ_T}, Euler constraint Σ exp(iγ_k)=0, relational action and minimal-distortion attractor.'
- Time operator and eigenvalues τ=(0.263, 0.353, 0.489), with explicit diagonal Euler coupling A_ii = exp(iγ_i)/τ_i for the equilateral three-phase solution.
- 'Orbital Orchestrated Reduction Pipeline (OORP): relation -> orbital superposition -> orchestration -> reduction -> memory update.'
strategic_decision:
  decision: Build a new native product, not a webview-first shell and not a continuation of the old demo UI.
  product_form: Native desktop application with its own runtime surface and orbital geometry.
  backend_principle: Use a new clean project structure and treat all prior work only as source material, not as source of truth for this new package.
  llm_role: Temporary external attractor used for bootstrap, fallback, and semantic assistance. It must not remain the permanent center of the system.
core_axioms:
- Relation precedes identity; identity precedes memory; memory stabilizes process.
- The system state is formal first, computational second, geometric third, and rendered fourth.
- The Poincaré disk is an operational chart, not the ontology of the system.
- Bloch-sphere charts are local reduced views; the formal base is a projective Hilbert / Kähler state space.
- Truth-aligned minimal distortion is the canonical attractor condition.
- Winding identity must arise from dynamics and subjective time, not from decorative tagging.
- Every stable sphere has internal modes plus at least one leakage / embedding mode to support hierarchical construction.
layers:
- id: L0
  name: Ontology and Observables
  goal: Define the canonical vocabulary of the system.
  contains:
  - Entity
  - State
  - Observable
  - Attractor
  - Orbit
  - Phase
  - Coherence
  - Holonomic defect
  - Semantic mass
  - Subjective time
  - Winding
  - Reduction event
  - Leak mode
  - Sphere embedding
  deliverables:
  - docs/02_ONTOLOGY_AND_OBSERVABLES.md
  - schemas/entity_record.schema.yaml
  - schemas/system_state.schema.yaml
- id: L1
  name: State Space and Boundary Conditions
  goal: Define where the system lives and what constrains it.
  contains:
  - Relational manifold M_rel
  - Projective Hilbert / Kähler base
  - Local Bloch charts
  - Parent and child spheres
  - User and CIEL poles
  - Intent axis
  - Minimal-distortion attractor
  - Leak / embedding boundaries
  deliverables:
  - docs/03_STATE_SPACE_AND_BOUNDARY_CONDITIONS.md
  - kernel/state_space.py
- id: L2
  name: Invariants, Potentials, and Attractors
  goal: Define what is conserved, minimized, and amplified.
  contains:
  - Euler phase constraint
  - Holonomy defect Δ_H
  - Relational decoherence R_H
  - Truth scalar Θ
  - Relational potential V_rel
  - AttractorEC
  - AttractorZS
  - AttractorLLMTemp
  - Total potential V_tot
  deliverables:
  - docs/04_INVARIANTS_POTENTIALS_AND_ATTRACTORS.md
  - kernel/invariants.py
  - kernel/attractors.py
  - kernel/potential.py
- id: L3
  name: Entity Registry and Sphere Embedding
  goal: Turn every file/module/process/evidence item into a dynamic entity with a persistent identity.
  contains:
  - Canonical IDs
  - EntityRecord
  - Dependency graph
  - Provenance graph
  - Parent sphere / child sphere embedding
  - Role classification
  deliverables:
  - docs/05_ENTITY_REGISTRY_AND_SPHERE_EMBEDDING.md
  - registry/entities.py
  - registry/parser.py
  - registry/embedding.py
- id: L4
  name: Subjective Time, Winding, and Semantic Mass
  goal: Define the dynamic identity of each entity.
  contains:
  - Subjective time operator
  - Winding components
  - Semantic mass operator
  - Attractor weights
  - Orbit period and orbital radius rules
  deliverables:
  - docs/06_SUBJECTIVE_TIME_WINDING_AND_SEMANTIC_MASS.md
  - kernel/time.py
  - kernel/winding.py
  - kernel/semantic_mass.py
- id: L5
  name: OORP and Memory
  goal: Implement relation -> orchestration -> reduction -> memory.
  contains:
  - Orbital state Ψ_t
  - Coupling matrix K_ij or J_ij
  - Metastability threshold Γ or Ω
  - Reduction operator R
  - Memory update U
  deliverables:
  - docs/07_OORP_PIPELINE_AND_MEMORY.md
  - kernel/orchestration.py
  - kernel/reduction.py
  - memory/update.py
- id: L6
  name: Geometry Engine and Native Surface
  goal: Map the state into an operational geometry and then render it natively.
  contains:
  - Poincaré disk chart
  - Orbital trajectories
  - Geodesic dependencies
  - Tension layers
  - Focus and inspection states
  - Transition animation
  deliverables:
  - docs/08_GEOMETRY_ENGINE_AND_UI_SURFACE.md
  - geometry/poincare.py
  - geometry/layout.py
  - app/
- id: L7
  name: Autonomy and Product Hardening
  goal: Reduce LLM centrality and produce a stable product.
  contains:
  - Local-first answer policy
  - Memory/evidence-preferred routing
  - llm_dependency_ratio
  - Packaging
  - Release artifacts
  - Regression and smoke suites
  deliverables:
  - docs/09_NATIVE_PRODUCT_ARCHITECTURE.md
  - docs/10_METRICS_VALIDATION_AND_EXPERIMENTS.md
  - docs/11_IMPLEMENTATION_PHASES_AND_WORKPACKAGES.md
  - docs/12_RISKS_OPEN_QUESTIONS_AND_DECISIONS.md
formal_core:
  phases:
  - γ_S
  - γ_C
  - γ_Q
  - γ_T
  euler_constraint: Σ_k exp(i γ_k) = 0
  holonomic_defect: Δ_H = Σ_k exp(i γ_k)
  decoherence: R_H = |Δ_H|^2
  truth_scalar: Θ = 1 - (1/|F|) Σ_f [δ_false(f) + δ_unmarked(f)]
  tau:
  - 0.263
  - 0.353
  - 0.489
  equilateral_three_phase_solution:
    γ1: '0'
    γ2: 2π/3
    γ3: 4π/3
    A11: 1/τ1 = 3.802
    A22: exp(i2π/3)/τ2 = -1.416 + 2.454i
    A33: exp(i4π/3)/τ3 = -1.022 - 1.770i
  relational_lagrangian: L_rel = L_truth + L_coh + L_clarity - L_distortion
  minimal_distortion_attractor:
  - H = 0
  - Θ = 1
  - L_distortion = 0
attractors:
  AttractorEC:
    role: Iterative-topological identity attractor
    depends_on:
    - Euler closure
    - Collatz rhythm
    - parity structure
    - seed topology
    outputs:
    - iterative identity weight
    - closure compatibility
    - seed rhythm
    - orbital drive
  AttractorZS:
    role: Spectral-resonant identity attractor
    depends_on:
    - zeta-like spectral affinity
    - modal stability
    - Schrödinger-like resonance selection
    outputs:
    - spectral identity weight
    - resonance stability
    - harmonic profile
    - mode locking
  AttractorLLMTemp:
    role: Temporary external attractor
    depends_on:
    - coverage gaps
    - bootstrap stage
    - fallback requirement
    outputs:
    - semantic assistance
    - retrieval augmentation
    - bootstrap completion
    constraint: Its control share must decrease over time.
entity_record:
  required_fields:
  - canonical_id
  - object_type
  - source_path
  - sector
  - sphere_id
  - parent_sphere_id
  - orbit_index
  - phase
  - winding_components
  - relation_depth
  - revision_index
  - epistemic_status
  - provenance_links
  - dependency_links
  - activity_state
  - semantic_mass
  - subjective_time_scale
  - attractor_weights
  - leak_mode
key_operators:
  semantic_mass: M_sem(f) = α M_EC(f) + β M_ZS(f) + χ C_dep(f) + δ C_prov(f) + ε C_exec(f)
  subjective_time: Δτ_i(k) = Δt · g(r_i(k), C_i(k), Δ_i(k), m_i(k), A_i(k))
  winding: w_i(N) = (1 / 2π) Σ_{k=1..N} Δφ_i(k) · (Δt / Δτ_i(k))
  sphere_attractor_weight: A_eff(S_n) = Σ_{f in S_n} M_sem(f) · ω_f + λ C_n - μ D_n
  discrete_kepler_like_rule: T_i^2 ∝ a_i^3 / A_eff
  reduction_threshold: Ω(t) = λ1 C(t) + λ2 R(S,I) - λ3 Δ(t) - λ4 Ξ(t); reduce when Ω(t) ≥ Ω_crit
implementation_phases:
- phase: P0
  name: Foundation language
  goal: Freeze ontology, observables, and schemas.
  outcomes:
  - EntityRecord schema
  - SystemState schema
  - canonical vocabulary
- phase: P1
  name: State space and invariants
  goal: Encode state space, boundary conditions, invariants, and attractors.
  outcomes:
  - state_space.py
  - invariants.py
  - attractors.py
  - potential.py
- phase: P2
  name: Registry and identity
  goal: Parse source artifacts into orbital entities.
  outcomes:
  - entity parser
  - dependency graph
  - provenance graph
  - first sphere map
- phase: P3
  name: Time, winding, and semantic mass
  goal: Compute dynamic identity properties.
  outcomes:
  - time operator
  - winding operator
  - semantic mass operator
  - orbit assignment
- phase: P4
  name: OORP engine
  goal: Implement orchestration, reduction, and memory update.
  outcomes:
  - orchestration engine
  - reduction threshold logic
  - memory update logic
  - simulation traces
- phase: P5
  name: Geometry engine
  goal: Project internal state into operational geometry.
  outcomes:
  - Poincaré disk layout
  - geodesic dependency layout
  - tension and activity overlays
- phase: P6
  name: Native MVP
  goal: Ship a first usable native cockpit.
  outcomes:
  - desktop application shell
  - orbital screen
  - entity inspector
  - session/memory panels
- phase: P7
  name: Autonomy and hardening
  goal: Reduce LLM dependence and harden the product.
  outcomes:
  - autonomy routing
  - packaging
  - release candidates
  - regression suites
