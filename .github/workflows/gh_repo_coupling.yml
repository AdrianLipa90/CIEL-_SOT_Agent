name: live-gh-repo-coupling

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  couple:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run live GH coupling
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/run_gh_repo_coupling.py

      - name: Commit updated live state
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add integration/gh_coupling_state.json integration/gh_live_registry.json integration/reports/live_gh_coupling_report.json
            git commit -m "Update live GH coupling state"
            git push
          fi
