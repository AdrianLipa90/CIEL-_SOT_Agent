name: package

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  # Required for compatibility with newer GitHub-hosted runner environments.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Debian package (.deb)
  # ─────────────────────────────────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: bash packaging/deb/build_deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciel-sot-agent-deb
          path: dist/*.deb
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Android APK (.apk) via Buildozer
  # ─────────────────────────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_SDK_ROOT: /home/runner/.android/sdk
      ANDROID_NDK_HOME: /home/runner/.android/sdk/ndk/25.1.8937393
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev wget

      - name: Install Buildozer + Cython
        run: pip install --upgrade "buildozer==1.5.0" "python-for-android==2024.1.21" cython

      - name: Cache Buildozer and Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android/sdk
          key: buildozer-${{ runner.os }}-${{ hashFiles('packaging/android/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Set up Android SDK and build-tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          if [ ! -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          fi
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
          mkdir -p $ANDROID_SDK_ROOT/tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager

      - name: Build APK
        working-directory: packaging/android
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            buildozer -v android release
          else
            buildozer -v android debug
          fi

      - name: Collect APK
        run: |
          mkdir -p dist
          find packaging/android/bin -name "*.apk" -exec cp {} dist/ \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciel-orbital-control-apk
          path: dist/*.apk
          if-no-files-found: error
